# Kueue : quota GPU multi-tenant. ResourceFlavor -> ClusterQueue -> LocalQueue.
# Suppose Kueue installé : kubectl apply --server-side -f \
#   https://github.com/kubernetes-sigs/kueue/releases/download/v0.10.1/manifests.yaml
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: gpu-l4
spec:
  nodeLabels:
    nvidia.com/gpu.product: NVIDIA-L4
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: inference-cq
spec:
  namespaceSelector: {}          # toutes les namespaces
  resourceGroups:
    - coveredResources: ["nvidia.com/gpu", "cpu", "memory"]
      flavors:
        - name: gpu-l4
          resources:
            - name: "nvidia.com/gpu"
              nominalQuota: 1      # 1 L4 sur le nœud de démo
            - name: "cpu"
              nominalQuota: "8"
            - name: "memory"
              nominalQuota: "32Gi"
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  namespace: default
  name: inference-lq
spec:
  clusterQueue: inference-cq
